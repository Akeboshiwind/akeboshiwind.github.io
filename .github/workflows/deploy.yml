name: Build and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build Astro
        if: github.event.action != 'closed' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: npm run build

      - name: Build Astro (PR preview)
        if: github.event.action != 'closed' && github.event_name == 'pull_request'
        run: npx astro build --base /pr-preview/pr-${{ github.event.number }}/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          cname: bythe.rocks

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist/
          umbrella-dir: pr-preview
          pages-base-url: bythe.rocks
